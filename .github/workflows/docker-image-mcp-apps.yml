name: Docker Image CI - MCP Apps

on:
  push:
    branches: [main]
    paths:
      - "tools/mcp-apps/**"
      - ".github/workflows/docker-image-mcp-apps.yml"
  pull_request:
    branches: [main]
    paths:
      - "tools/mcp-apps/**"
      - ".github/workflows/docker-image-mcp-apps.yml"

jobs:
  dockerImage:
    uses: team-telnyx/infra-ci-gha-workflows/.github/workflows/dockerImage.yml@latest
    with:
      workflow_name: mcp-apps-docker-image
      metadata_dir: tools/mcp-apps
      build_dir: tools/mcp-apps
      image_name: mcp-apps
    secrets: inherit
