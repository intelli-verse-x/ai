# Publish @telnyx npm packages using OIDC.
# Triggered by GitHub Release or manual dispatch.
#
# npm setup required (one-time, by someone with @telnyx npm org access):
#   1. Create packages on npm (if they don't exist):
#      - @telnyx/agent-toolkit
#      - @telnyx/agent-cli
#      - @telnyx/opencode
#   2. For each package, go to Settings → Provenance and link:
#      - Repository: https://github.com/team-telnyx/ai
#      - Workflow: publish-npm.yml
#   3. Ensure publishConfig.access is "public" in each package.json
#
name: Publish npm
on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Which package to publish'
        required: true
        type: choice
        options:
          - all
          - typescript
          - cli
          - mcp
          - opencode
      gate_state:
        description: 'Publish gate state for incident routing'
        required: false
        default: enabled
        type: choice
        options:
          - enabled
          - disabled
          - override
      publish_disable_reason:
        description: 'Reason for blocking or overriding the publish gate'
        required: false
        type: string
      publish_disable_incident_id:
        description: 'Incident or ticket id for the publish-path alert'
        required: false
        type: string
      publish_disable_by:
        description: 'Actor recording the disable or override'
        required: false
        type: string
  release:
    types: [published]

jobs:
  publish-preflight:
    name: publish preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install root dependencies
        run: npm ci

      - name: Run publish secret scan
        run: npm run publish:preflight

  publish-typescript:
    name: publish @telnyx/agent-toolkit
    needs: publish-preflight
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'typescript')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: tools/typescript
        run: npm ci

      - name: Publish @telnyx/agent-toolkit
        env:
          PUBLISH_NPM_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gate_state == 'disabled' && 'false' || 'true' }}
          PUBLISH_NPM_GATE_STATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gate_state || 'enabled' }}
          PUBLISH_DISABLE_REASON: ${{ github.event.inputs.publish_disable_reason }}
          PUBLISH_DISABLE_INCIDENT_ID: ${{ github.event.inputs.publish_disable_incident_id }}
          PUBLISH_DISABLED_BY: ${{ github.event.inputs.publish_disable_by || github.actor }}
          PACKAGE_OWNER_ID: aisling404
          RELEASE_ONCALL_GROUP_ID: release-oncall
          WORKFLOW_NAME: publish-npm
        run: bash ./.github/bin/publish-npm tools/typescript

  publish-cli:
    name: publish @telnyx/agent-cli
    needs: publish-preflight
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'cli')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: cli
        run: npm ci

      - name: Publish @telnyx/agent-cli
        env:
          PUBLISH_NPM_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gate_state == 'disabled' && 'false' || 'true' }}
          PUBLISH_NPM_GATE_STATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gate_state || 'enabled' }}
          PUBLISH_DISABLE_REASON: ${{ github.event.inputs.publish_disable_reason }}
          PUBLISH_DISABLE_INCIDENT_ID: ${{ github.event.inputs.publish_disable_incident_id }}
          PUBLISH_DISABLED_BY: ${{ github.event.inputs.publish_disable_by || github.actor }}
          PACKAGE_OWNER_ID: aisling404
          RELEASE_ONCALL_GROUP_ID: release-oncall
          WORKFLOW_NAME: publish-npm
        run: bash ./.github/bin/publish-npm cli

  publish-mcp:
    name: publish @telnyx/mcp
    needs: publish-preflight
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'mcp')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: tools/mcp
        run: npm ci

      - name: Publish @telnyx/mcp
        env:
          PUBLISH_NPM_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gate_state == 'disabled' && 'false' || 'true' }}
          PUBLISH_NPM_GATE_STATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gate_state || 'enabled' }}
          PUBLISH_DISABLE_REASON: ${{ github.event.inputs.publish_disable_reason }}
          PUBLISH_DISABLE_INCIDENT_ID: ${{ github.event.inputs.publish_disable_incident_id }}
          PUBLISH_DISABLED_BY: ${{ github.event.inputs.publish_disable_by || github.actor }}
          PACKAGE_OWNER_ID: aisling404
          RELEASE_ONCALL_GROUP_ID: release-oncall
          WORKFLOW_NAME: publish-npm
        run: bash ./.github/bin/publish-npm tools/mcp

  publish-opencode:
    name: publish @telnyx/opencode
    needs: publish-preflight
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'opencode')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: plugins/opencode
        run: npm ci --legacy-peer-deps

      - name: Publish @telnyx/opencode
        env:
          PUBLISH_NPM_ENABLED: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gate_state == 'disabled' && 'false' || 'true' }}
          PUBLISH_NPM_GATE_STATE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.gate_state || 'enabled' }}
          PUBLISH_DISABLE_REASON: ${{ github.event.inputs.publish_disable_reason }}
          PUBLISH_DISABLE_INCIDENT_ID: ${{ github.event.inputs.publish_disable_incident_id }}
          PUBLISH_DISABLED_BY: ${{ github.event.inputs.publish_disable_by || github.actor }}
          PACKAGE_OWNER_ID: aaronjo-Telnyx
          RELEASE_ONCALL_GROUP_ID: release-oncall
          WORKFLOW_NAME: publish-npm
        run: bash ./.github/bin/publish-npm plugins/opencode

  publish-mcp-registry:
    name: publish to MCP Registry
    runs-on: ubuntu-latest
    needs: [publish-preflight, publish-mcp]
    if: >-
      github.repository == 'team-telnyx/ai' &&
      (github.event_name == 'release' || github.event.inputs.package == 'all' || github.event.inputs.package == 'mcp')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update server.json version
        working-directory: tools/mcp
        run: |
          VERSION=$(jq -r '.version' package.json)
          jq --arg version "$VERSION" '.version = $version | .packages[0].version = $version' server.json > server.json.tmp
          mv server.json.tmp server.json
          echo "Updated server.json to version $VERSION"

      - name: Install MCP Publisher CLI
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/v1.2.3/mcp-publisher_1.2.3_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz
          mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: tools/mcp
        run: mcp-publisher publish
