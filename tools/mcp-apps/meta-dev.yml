names:
  service: mcp-apps
  github: ai

project:
  squad: ai-fde-squad
  primary_maintainer: Oliver-Zimmerman
  public_api: true
  private_api: false
  processes_pii: true

build:
  allow_vulnerable_image: false
  dockerfile: tools/mcp-apps/Dockerfile
  context: tools/mcp-apps

deploy:
  service:
    - name: mcp-apps
      port: 8080
      tags: ["http"]
      ready:
        type: http
        method: GET
        path: /readyz
        interval: 30s
        timeout: 10s
        success_threshold: 1
  env:
    static:
      NODE_ENV: production
      PORT: "8080"
